  /api/v1/parents/courses/enrollments/:
    get:
      operationId: parents_courses_enrollments_list
      description: List enrollments visible to the authenticated user. For parents,
        this returns enrollments for their children only, including cohort details
        and the related course summary. Supports filtering by `student_id`, `course_id`,
        `cohort_id`, and `status`.
      summary: List course enrollments
      parameters:
      - in: query
        name: cohort_id
        schema:
          type: string
          format: uuid
        description: Filter by one cohort id.
      - in: query
        name: course_id
        schema:
          type: string
          format: uuid
        description: Filter by one course id.
      - in: query
        name: status
        schema:
          type: string
        description: Filter by enrollment status.
      - in: query
        name: student_id
        schema:
          type: string
          format: uuid
        description: Filter by one child/student id. Parent results remain scoped
          to their own children.
      tags:
      - parents
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EnrollmentOutput'
          description: ''
    post:
      operationId: parents_courses_enrollments_create
      description: 'Start a parent checkout for one or more child cohort enrollments.
        The request is cart-based: send a Stripe PaymentMethod id (`pm_...`) plus
        a list of student/cohort pairs. Full payments create a Stripe PaymentIntent.
        Weekly payments create a limited-length Stripe subscription that auto-cancels
        after the requested installment count. Actual Enrollment rows are created
        by the Stripe webhook after the first payment succeeds.'
      summary: Create parent cohort enrollment checkout
      tags:
      - parents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParentEnrollmentCheckoutInputRequest'
        required: true
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParentEnrollmentCheckoutOutput'
          description: ''
