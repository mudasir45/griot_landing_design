openapi: 3.0.3
info:
  title: Griot Academy LMS API
  version: 1.0.0
  description: Griot Academy LMS.
paths:
  /api/v1/auth/contact-us/:
    post:
      operationId: auth_contact_us_create
      description: Public contact-us form submission for administrative follow-up.
      summary: Submit contact inquiry
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactInquiryInputRequest'
        required: true
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactInquiryOutput'
          description: ''
        '400':
          description: Validation error.
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: Email + password for PARENT, TEACHER, and ADMIN. Students use passkey
        endpoints.
      summary: Password login
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordLoginInputRequest'
        required: true
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwtLoginResponse'
          description: ''
        '400':
          description: Invalid credentials or domain error.
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Clears HttpOnly JWT cookies. No body required.
      summary: Logout
      tags:
      - authentication
      security:
      - {}
      responses:
        '204':
          description: Cookies cleared; no response body.
  /api/v1/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Returns the authenticated user's profile.
      summary: Current user
      tags:
      - authentication
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOutput'
          description: ''
        '401':
          description: Not authenticated.
  /api/v1/auth/options/:
    get:
      operationId: auth_options_list
      description: GET /api/v1/auth/options/
      summary: List auth options
      tags:
      - authentication
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuthOptionOutput'
          description: ''
  /api/v1/auth/options/{code}/:
    patch:
      operationId: auth_options_partial_update
      description: PATCH /api/v1/auth/options/<code>/
      summary: Update auth option
      parameters:
      - in: path
        name: code
        schema:
          type: string
        required: true
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAuthOptionUpdateInputRequest'
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthOptionOutput'
          description: ''
  /api/v1/auth/password/change/:
    post:
      operationId: auth_password_change_create
      description: Authenticated users can change their password by providing the
        current password and a new password.
      summary: Change password
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeInputRequest'
        required: true
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetMessage'
          description: ''
        '400':
          description: Validation error.
        '401':
          description: Not authenticated.
  /api/v1/auth/password/reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      description: Submit email, reset code, and new password to complete the password
        reset.
      summary: Confirm password reset
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmInputRequest'
        required: true
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetMessage'
          description: ''
  /api/v1/auth/password/reset/request/:
    post:
      operationId: auth_password_reset_request_create
      description: Always returns the same success message to avoid email enumeration.
        If the account exists, a reset verification code is emailed.
      summary: Request password reset
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestInputRequest'
        required: true
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetMessage'
          description: ''
        '429':
          description: Too many reset requests.
  /api/v1/auth/phone/verify/confirm/:
    post:
      operationId: auth_phone_verify_confirm_create
      description: Submit a phone verification code for a parent and mark the phone
        as verified.
      summary: Confirm phone verification
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationConfirmInputRequest'
        required: true
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParentJwtLoginResponse'
          description: ''
        '400':
          description: Invalid or expired phone verification code.
  /api/v1/auth/phone/verify/request/:
    post:
      operationId: auth_phone_verify_request_create
      description: Send or resend a phone verification code. Authenticated parents
        can omit email; unauthenticated requests must include email.
      summary: Request phone verification
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationRequestInputRequest'
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneVerificationMessage'
          description: ''
        '400':
          description: Validation or phone verification error.
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: Create a parent account. Returns a verification message when email
        verification is enabled, otherwise returns JWT.
      summary: Register parent
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParentRegisterInputRequest'
        required: true
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParentRegisterResponse'
          description: ''
        '400':
          description: Validation error.
  /api/v1/auth/register/verify-email/:
    post:
      operationId: auth_register_verify_email_create
      description: Submit email and verification code. Returns JWT when phone verification
        is not required, otherwise sends a phone verification code and returns a message.
      summary: Verify parent email
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParentEmailVerifyInputRequest'
        required: true
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParentRegisterResponse'
          description: ''
        '400':
          description: Invalid or expired verification code.
  /api/v1/auth/social/{provider}/callback/:
    get:
      operationId: auth_social_callback_retrieve
      summary: Social OAuth callback
      parameters:
      - in: query
        name: code
        schema:
          type: string
      - in: query
        name: error
        schema:
          type: string
      - in: path
        name: provider
        schema:
          type: string
        required: true
      - in: query
        name: state
        schema:
          type: string
      tags:
      - authentication
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwtLoginResponse'
          description: ''
  /api/v1/auth/social/{provider}/disconnect/:
    post:
      operationId: auth_social_disconnect_create
      summary: Disconnect social provider
      parameters:
      - in: path
        name: provider
        schema:
          type: string
        required: true
      tags:
      - authentication
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialDisconnectOutput'
          description: ''
  /api/v1/auth/social/{provider}/start/:
    post:
      operationId: auth_social_start_create
      summary: Start social OAuth flow
      parameters:
      - in: path
        name: provider
        schema:
          type: string
        required: true
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialStartInputRequest'
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialStartOutput'
          description: ''
  /api/v1/auth/social/{provider}/status/:
    get:
      operationId: auth_social_status_retrieve
      summary: Social provider connection status
      parameters:
      - in: path
        name: provider
        schema:
          type: string
        required: true
      tags:
      - authentication
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialStatusOutput'
          description: ''
  /api/v1/auth/social/providers/:
    get:
      operationId: auth_social_providers_list
      description: Returns currently enabled social providers for frontend login buttons.
      summary: List social providers
      tags:
      - authentication
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SocialProviderOutput'
          description: ''
  /api/v1/auth/student/register/{token}/:
    get:
      operationId: auth_student_register_retrieve
      description: Validate invitation token and return WebAuthn creation options
        from django-passkeys (state for navigator.credentials.create).
      summary: Begin student passkey registration
      parameters:
      - in: path
        name: token
        schema:
          type: string
        description: Raw invitation token from the parent's link.
        required: true
      tags:
      - authentication
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentRegisterBeginResponse'
              examples:
                Success:
                  value:
                    student:
                      id: 37307b3c-171e-49aa-a566-4686370b927d
                      legal_name: string
                      role: STUDENT
                      is_active: true
                      date_of_birth: '2026-05-20'
                      grade: 12
                      relationship_to_child: string
                      gender: null
                      profile_photo: null
                      special_accommodations: ''
                      initial_interests:
                      - coding
                      has_passkey: false
                      created_at: '2026-05-20T22:22:43.942842Z'
                    webauthn:
                      options:
                        publicKey:
                          rp:
                            name: Griot Academy
                            id: localhost
                          user:
                            name: string
                            id: YzNSeWFXNW4
                            displayName: string
                          challenge: XoG8iJqNrmoWt4yUN4awfNpGZLWQwHxUpq9QsJjDMtw
                          pubKeyCredParams:
                          - type: public-key
                            alg: -7
                          excludeCredentials: []
                          authenticatorSelection:
                            residentKey: preferred
                            requireResidentKey: false
                      state_token: eyJjaGFsbGVuZ2UiOiJ...
          description: ''
        '400':
          description: Invalid, used, superseded, or expired invitation.
        '503':
          description: Passkey library not installed.
  /api/v1/auth/student/register/{token}/complete/:
    post:
      operationId: auth_student_register_complete_create
      description: Submit WebAuthn credential from the browser; registers passkey,
        consumes invitation once, returns JWT (same shape as password login).
      summary: Complete student passkey registration
      parameters:
      - in: path
        name: token
        schema:
          type: string
        description: Same raw invitation token as the begin step.
        required: true
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentPasskeyRegisterCompleteInputRequest'
        required: true
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwtLoginResponse'
          description: ''
        '400':
          description: Passkey failure, invalid token, or invitation no longer valid.
        '503':
          description: Passkey library not installed.
  /api/v1/auth/teacher/social/{provider}/callback/:
    get:
      operationId: auth_teacher_social_callback_retrieve
      summary: TEACHER social OAuth callback
      parameters:
      - in: query
        name: code
        schema:
          type: string
      - in: query
        name: error
        schema:
          type: string
      - in: path
        name: provider
        schema:
          type: string
        required: true
      - in: query
        name: state
        schema:
          type: string
      tags:
      - authentication
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherJwtLoginResponse'
          description: ''
  /api/v1/auth/teacher/social/{provider}/start/:
    post:
      operationId: auth_teacher_social_start_create
      summary: Start TEACHER social OAuth flow
      parameters:
      - in: path
        name: provider
        schema:
          type: string
        required: true
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialStartInputRequest'
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialStartOutput'
          description: ''
  /api/v1/auth/teachers/:
    post:
      operationId: auth_teachers_create
      description: Admin-only. Creates a teacher user; optional password or invite
        flow.
      summary: Create teacher (admin)
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherCreateInputRequest'
        required: true
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherUserOutput'
          description: ''
        '400':
          description: Validation or domain error.
        '401':
          description: Not authenticated.
        '403':
          description: Not an admin.
  /api/v1/auth/teachers/{user_id}/approval/:
    post:
      operationId: auth_teachers_approval_create
      summary: Approve or reject teacher registration
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherApprovalDecisionInputRequest'
        required: true
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherUserOutput'
          description: ''
  /api/v1/auth/teachers/pending/:
    get:
      operationId: auth_teachers_pending_list
      summary: List pending teacher registrations
      tags:
      - authentication
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeacherUserOutput'
          description: ''
  /api/v1/auth/teachers/register/:
    post:
      operationId: auth_teachers_register_create
      description: Creates a TEACHER account in pending approval state.
      summary: Register teacher (self-service)
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherSelfRegisterInputRequest'
        required: true
      security:
      - jwtCookieOrBearer: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherJwtLoginResponse'
          description: ''
        '400':
          description: Validation or domain error.
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: Refresh access token from JSON body and/or HttpOnly refresh cookie;
        sets cookies on success.
      summary: Refresh JWT
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequestRequest'
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
          description: ''
        '400':
          description: Refresh token missing.
        '401':
          description: Invalid or expired refresh token.
  /api/v1/auth/token/verify/:
    post:
      operationId: auth_token_verify_create
      description: 'Validate a JWT (access or refresh) without issuing new tokens.
        POST JSON `{"token": "<jwt>"}` — same contract as SimpleJWT''s token verify.'
      summary: Verify JWT
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequestRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          description: Token is valid (response body may be empty).
        '401':
          description: Invalid, expired, or blacklisted token.
  /api/v1/authoring/activities/{activity_id}/:
    get:
      operationId: authoring_activities_retrieve
      parameters:
      - in: path
        name: activity_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - authoring
      security:
      - {}
      responses:
        '200':
          description: No response body
    patch:
      operationId: authoring_activities_partial_update
      parameters:
      - in: path
        name: activity_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - authoring
      security:
      - {}
      responses:
        '200':
          description: No response body
    delete:
      operationId: authoring_activities_destroy
      parameters:
      - in: path
        name: activity_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - authoring
      security:
      - {}
      responses:
        '204':
          description: No response body
  /api/v1/authoring/activities/{activity_id}/questions/:
    get:
      operationId: authoring_activities_questions_retrieve
      parameters:
      - in: path
        name: activity_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - authoring
      security:
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: authoring_activities_questions_create
      parameters:
      - in: path
        name: activity_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - authoring
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/authoring/activity-questions/{activity_question_id}/:
    patch:
      operationId: authoring_activity_questions_partial_update
      parameters:
      - in: path
        name: activity_question_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - authoring
      security:
      - {}
      responses:
        '200':
          description: No response body
    delete:
      operationId: authoring_activity_questions_destroy
      parameters:
      - in: path
        name: activity_question_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - authoring
      security:
      - {}
      responses:
        '204':
          description: No response body
  /api/v1/authoring/activity-types/:
    get:
      operationId: authoring_activity_types_retrieve
      tags:
      - Authoring
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
          description: ''
  /api/v1/authoring/cohorts/:
    get:
      operationId: authoring_cohorts_retrieve
      tags:
      - authoring
      security:
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: authoring_cohorts_create
      tags:
      - authoring
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/authoring/cohorts/{cohort_id}/:
    patch:
      operationId: authoring_cohorts_partial_update
      parameters:
      - in: path
        name: cohort_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - authoring
      security:
      - {}
      responses:
        '200':
          description: No response body
    delete:
      operationId: authoring_cohorts_destroy
      parameters:
      - in: path
        name: cohort_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - authoring
      security:
      - {}
      responses:
        '204':
          description: No response body
  /api/v1/authoring/course-categories/:
    get:
      operationId: authoring_course_categories_list
      tags:
      - Authoring
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuthoringCourseCategory'
          description: ''
  /api/v1/authoring/courses/:
    get:
      operationId: authoring_courses_list
      tags:
      - Authoring
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuthoringCourse'
          description: ''
    post:
      operationId: authoring_courses_create
      tags:
      - authoring
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/authoring/courses/{course_id}/:
    patch:
      operationId: authoring_courses_partial_update
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - authoring
      security:
      - {}
      responses:
        '200':
          description: No response body
    delete:
      operationId: authoring_courses_destroy
      parameters:
      - in: path
        name: course_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - authoring
      security:
      - {}
      responses:
        '204':
          description: No response body
