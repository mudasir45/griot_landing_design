components:
  schemas:
    AuthOptionOutput:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        is_enabled:
          type: boolean
      required:
      - code
      - description
      - is_enabled
      - name
    AuthenticateOptionsRequest:
      type: object
      properties:
        username:
          type: string
          default: ''
    AuthenticateVerifyRequest:
      type: object
      properties:
        state_token:
          type: string
          minLength: 1
        credential:
          type: object
          additionalProperties: {}
      required:
      - credential
      - state_token
    AuthoringCourse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        title:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
        label:
          type: string
          readOnly: true
        course_type:
          type: string
          readOnly: true
          nullable: true
        description:
          type: string
          readOnly: true
          nullable: true
        learning_objectives:
          type: array
          items:
            type: string
          readOnly: true
        thumbnail:
          type: string
          readOnly: true
          nullable: true
        banner:
          type: string
          readOnly: true
          nullable: true
        tags:
          type: string
          readOnly: true
        category_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        default_teacher_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        publication_status:
          enum:
          - draft
          - published
          - archived
          type: string
          description: |-
            * `draft` - Draft
            * `published` - Published
            * `archived` - Archived
          x-spec-enum-id: 3999cf41a064d13a
          readOnly: true
        min_grade:
          type: integer
          readOnly: true
          nullable: true
        max_grade:
          type: integer
          readOnly: true
          nullable: true
        default_capacity:
          type: integer
          readOnly: true
          nullable: true
        default_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
        session_time_minutes:
          type: integer
          readOnly: true
          description: Default session duration for this course, in minutes.
        default_stripe_price_id:
          type: string
          readOnly: true
          nullable: true
        default_weekly_stripe_price_id:
          type: string
          readOnly: true
          nullable: true
        refund_window_ms:
          type: integer
          readOnly: true
          nullable: true
        default_lesson_set_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        default_session_set_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
      required:
      - banner
      - category_id
      - course_type
      - default_capacity
      - default_lesson_set_id
      - default_price
      - default_session_set_id
      - default_stripe_price_id
      - default_teacher_id
      - default_weekly_stripe_price_id
      - description
      - id
      - label
      - learning_objectives
      - max_grade
      - min_grade
      - name
      - publication_status
      - refund_window_ms
      - session_time_minutes
      - slug
      - tags
      - thumbnail
      - title
    AuthoringCourseCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
          nullable: true
      required:
      - id
      - name
      - slug
    AuthoringLesson:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        slug:
          type: string
        course_id:
          type: string
          format: uuid
        course_title:
          type: string
          nullable: true
        lesson_set_id:
          type: string
          format: uuid
          nullable: true
        lesson_set_name:
          type: string
          nullable: true
        lesson_set_item_id:
          type: string
          format: uuid
          nullable: true
        position:
          type: integer
          nullable: true
        payload_content_id:
          type: string
          format: uuid
          nullable: true
        label:
          type: string
      required:
